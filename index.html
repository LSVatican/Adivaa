<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivaa - Clicking Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="watermark">LS Vatican</div>

        <div class="top-bar">
            <div class="stat-box">💖 <span id="clicks">0</span></div>
            <div class="stat-box">✨ <span id="rebirths">0</span></div>
            <select id="lang-select" onchange="changeLanguage()">
                <option value="id">ID</option>
                <option value="en">EN</option>
                <option value="jp">JP</option>
                <option value="kr">KR</option>
                <option value="fr">FR</option>
            </select>
        </div>

        <div class="click-area" onclick="handleButtonClick(event)">
            <img src="/Adivaa.jpg" id="game-icon" alt="Click Me">
            <h1 id="game-title">Adivaa</h1>
            <p id="multiplier-display">Multiplier: x1</p>
        </div>

        <div class="bottom-menu">
            <button onclick="togglePopup('shop-popup')">🛒 <span data-lang="shop">Shop</span></button>
            <button onclick="togglePopup('pet-popup')">🐶 <span data-lang="pets">Pets</span></button>
            <button onclick="togglePopup('upgrade-popup')">⚡ <span data-lang="upgrades">Upgrades</span></button>
            <button onclick="togglePopup('rebirth-popup')">🌀 <span data-lang="rebirth">Rebirth</span></button>
        </div>

        <div id="shop-popup" class="popup">
            <div class="popup-content">
                <h2 data-lang="petShopTitle">Pet Shop</h2>
                <div class="pet-egg" onclick="buyPet()">
                    <p>Beli Pet (500 💖)</p>
                </div>
                <button class="close-btn" onclick="togglePopup('shop-popup')">X</button>
            </div>
        </div>

        <div id="pet-popup" class="popup">
            <div class="popup-content">
                <h2 data-lang="inventoryTitle">Inventory Pet</h2>
                <div id="pet-list" class="grid-list"></div>
                <button class="close-btn" onclick="togglePopup('pet-popup')">X</button>
            </div>
        </div>

        <div id="upgrade-popup" class="popup">
            <div class="popup-content">
                <h2 data-lang="upgradeTitle">Upgrades</h2>
                <div class="upgrade-item">
                    <p id="upgrade-info">Click Power (Level 0)</p>
                    <button onclick="buyUpgrade()" id="upgrade-btn">Upgrade (100 💖)</button>
                    <p id="upgrade-requirement" style="font-size: 10px; color: #ffeb3b;"></p>
                </div>
                <button class="close-btn" onclick="togglePopup('upgrade-popup')">X</button>
            </div>
        </div>

        <div id="rebirth-popup" class="popup">
            <div class="popup-content">
                <h2 data-lang="rebirthTitle">Rebirth</h2>
                <p id="rebirth-cost">Syarat: 10,000 💖</p>
                <button class="rebirth-btn" onclick="doRebirth()">Rebirth Now!</button>
                <button class="close-btn" onclick="togglePopup('rebirth-popup')">X</button>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
