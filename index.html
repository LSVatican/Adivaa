<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivaa - Clicking Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="watermark">LS Vatican</div>

    <div id="login-overlay" class="overlay">
    <div class="login-card">
        <h1 class="glow-title">Adivaa</h1>
        <p>Login untuk masuk ke game</p>
        
        <button id="google-login-btn" onclick="loginWithGoogle()">
            <img src="/Google.png" width="20" alt="G"> 
            Login with Google
        </button>
        
    </div>
</div>

    <div id="game-container" style="display:none;">
        <div class="top-bar">
            <div class="stat-box">💖 <span id="clicks">0</span></div>
            <div class="stat-box">✨ <span id="rebirths">0</span></div>
            <div class="user-info" onclick="togglePopup('profile-popup')">
                <img id="user-photo" src="" alt="User">
            </div>
        </div>

        <div class="click-area" onclick="handleButtonClick(event)">
            <img src="/Adivaa.jpg" id="game-icon" alt="Clicker">
            <h1 id="game-title">Adivaa</h1>
            <p id="multiplier-display" class="glow-text">Multiplier: x1</p>
            <select id="lang-select" onchange="changeLanguage()">
                <option value="id">ID</option>
                <option value="en">EN</option>
                <option value="jp">JP</option>
                <option value="kr">KR</option>
                <option value="fr">FR</option>
            </select>
        </div>

        <div class="bottom-menu">
            <button onclick="togglePopup('shop-popup')">🛒 <span data-lang="shop">Shop</span></button>
            <button onclick="togglePopup('pet-popup')">🐶 <span data-lang="pets">Pets</span></button>
            <button onclick="togglePopup('upgrade-popup')">⚡ <span data-lang="upgrades">Upgrades</span></button>
            <button onclick="togglePopup('rebirth-popup')">🌀 <span data-lang="rebirth">Rebirth</span></button>
        </div>
    </div>

    <div id="shop-popup" class="popup"><div class="popup-content">
        <h2 data-lang="petShopTitle">Pet Shop</h2>
        <div class="egg-btn" onclick="buyPet()">Beli Pet (500 💖)</div>
        <button class="close-btn" onclick="togglePopup('shop-popup')">X</button>
    </div></div>

    <div id="pet-popup" class="popup"><div class="popup-content">
        <h2 data-lang="inventoryTitle">Inventory</h2>
        <div id="pet-list" class="grid-list"></div>
        <button class="close-btn" onclick="togglePopup('pet-popup')">X</button>
    </div></div>

    <div id="upgrade-popup" class="popup"><div class="popup-content">
        <h2 data-lang="upgradeTitle">Upgrades</h2>
        <div class="upgrade-card">
            <p id="upgrade-info">Click Power (Level 0)</p>
            <button onclick="buyUpgrade()" id="upgrade-btn">Upgrade</button>
            <p id="upgrade-req" class="small-text"></p>
        </div>
        <button class="close-btn" onclick="togglePopup('upgrade-popup')">X</button>
    </div></div>

    <div id="rebirth-popup" class="popup"><div class="popup-content">
        <h2 data-lang="rebirthTitle">Rebirth</h2>
        <p id="rebirth-cost">Syarat: 10,000 💖</p>
        <button class="rebirth-btn" onclick="doRebirth()">Rebirth!</button>
        <button class="close-btn" onclick="togglePopup('rebirth-popup')">X</button>
    </div></div>

    <div id="profile-popup" class="popup"><div class="popup-content">
        <h2 id="display-name">User</h2>
        <button class="menu-btn feedback" onclick="togglePopup('feedback-popup')">Feedback / Hapus Akun</button>
        <button class="menu-btn logout" onclick="togglePopup('logout-confirm')">Logout</button>
        <button class="close-btn" onclick="togglePopup('profile-popup')">X</button>
    </div></div>

    <div id="logout-confirm" class="popup"><div class="popup-content">
        <p>Keluar dari game?</p>
        <button onclick="logout()">Ya</button>
        <button onclick="togglePopup('logout-confirm')">Tidak</button>
    </div></div>

    <div id="feedback-popup" class="popup"><div class="popup-content">
        <h2>Feedback</h2>
        <form action="https://formspree.io/f/mojydejl" method="POST">
            <input type="hidden" name="user" id="f-user">
            <textarea name="message" placeholder="Tulis saran atau permintaan hapus akun..." required></textarea>
            <button type="submit">Kirim</button>
        </form>
        <button class="close-btn" onclick="togglePopup('feedback-popup')">X</button>
    </div></div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
